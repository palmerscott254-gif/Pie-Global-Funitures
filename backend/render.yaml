services:
  # Django Backend Service
  - type: web
    name: pie-global-backend
    env: python
    region: oregon
    buildCommand: "bash ./build.sh"
    startCommand: "python manage.py migrate && gunicorn pie_global.wsgi:application --workers 1 --threads 2 --timeout 120 --graceful-timeout 30 --max-requests 200 --max-requests-jitter 50"
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        value: localhost,127.0.0.1,pie-global-funitures.onrender.com,*.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: pie-global-db
          property: connectionString
      - key: BACKEND_URL
        value: https://pie-global-funitures.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://pie-global-funitures.vercel.app,https://pie-global-funitures-git-main-palmerscott254-gifs-projects.vercel.app
      - key: CORS_ALLOW_ALL_ORIGINS
        value: False
      - key: WHITENOISE_AUTOREFRESH
