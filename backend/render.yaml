services:
  # Django Backend Service
  - type: web
    name: pie-global-backend
    env: python
    region: oregon
    buildCommand: "bash ./build.sh"
    startCommand: "python manage.py migrate && gunicorn pie_global.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: pie-global-db
          property: connectionString
      - key: BACKEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOW_ALL_ORIGINS
        value: False
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
    healthCheckPath: /api/health/

  # PostgreSQL Database
databases:
  - name: pie-global-db
    databaseName: pie_global_db
    user: pie_global_user
    region: oregon
